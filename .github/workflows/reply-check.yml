name: Détection Réponses Entreprises (SMS)

on:
  schedule:
    - cron: '*/30 * * * *'   # toutes les 30 minutes : emails non lus
    - cron: '0 6 * * *'      # tous les matins à 6h UTC : rattrapage 30 jours
  workflow_dispatch:
    inputs:
      check_all:
        description: 'Verifier aussi les emails deja lus (30 derniers jours)'
        required: false
        default: false
        type: boolean

jobs:
  check-replies:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Installer les dependances
        run: pip install -r requirements-ci.txt

      - name: Verifier les reponses et envoyer SMS si besoin (emails non lus)
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.SMTP_USER }}
          SMS_EMAIL: ${{ secrets.SMS_EMAIL }}
          DATABASE_URL: sqlite:///jobs.db
          LOG_LEVEL: INFO
        run: python main.py --check-replies

      - name: Rattrapage quotidien - verifier tous les emails des 30 derniers jours
        if: ${{ github.event.schedule == '0 6 * * *' || github.event.inputs.check_all == 'true' }}
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.SMTP_USER }}
          SMS_EMAIL: ${{ secrets.SMS_EMAIL }}
          DATABASE_URL: sqlite:///jobs.db
          LOG_LEVEL: INFO
        run: python check_replies_now.py
