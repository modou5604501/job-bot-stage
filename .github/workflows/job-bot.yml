name: Job Bot — Recherche Stage Géomatique

on:
  schedule:
    - cron: '0 */4 * * *'   # toutes les 4h (6x/jour, 24h/24, PC éteint ou non)
  workflow_dispatch:          # lancement manuel depuis GitHub si besoin

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Restaurer base de donnees (deduplication inter-cycles)
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Installer les dependances
        run: pip install -r requirements-ci.txt

      - name: Lancer le bot (cycle complet)
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.SMTP_USER }}
          SMS_EMAIL: ${{ secrets.SMS_EMAIL }}
          DATABASE_URL: sqlite:///jobs.db
          LOG_LEVEL: INFO
          HUNTER_IO_API_KEY: ${{ secrets.HUNTER_IO_API_KEY }}
          INDEED_SEARCH_QUERIES: geomatique,geomatics,GIS,environment intern,stage environnement,stage topographie,hydrologie,amenagement territoire,remote sensing,stage ecologie,cartographie
          INDEED_LOCATION: Canada
          # CV_PATH non defini : le bot utilise le CV ATS genere automatiquement par cv_adapter_engine.py
        run: python main.py --run-once
