name: Test SMS Bell Canada

on:
  workflow_dispatch:   # lancement manuel depuis GitHub Actions

jobs:
  test-sms:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Installer les dependances
        run: pip install -r requirements-ci.txt

      - name: Envoyer SMS de test au 819-919-8401
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.SMTP_USER }}
          SMS_EMAIL: 8199198401@txt.bell.ca
          DATABASE_URL: sqlite:///jobs.db
          LOG_LEVEL: INFO
        run: python send_test_sms.py
