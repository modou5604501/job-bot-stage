name: Keep-Alive — Empeche la desactivation automatique (60 jours)

on:
  schedule:
    - cron: '0 8 1 * *'   # Le 1er de chaque mois a 8h UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Commit de maintien d'activite
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u '+%Y-%m')" || echo "Rien a committer"
          git push
